name: Bluesky Scheduled Posts

on:
  schedule:
    - cron: '5 20,4,12 * * *' # Run at 01:35, 09:35, 17:35 IST (post times: 01:30, 09:30, 17:30)
  workflow_dispatch: # Allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run scheduler
        id: scheduler
        run: |
          npx tsx scripts/bluesky-scheduled-executor.ts
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Commit finished posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Bluesky posts status updated [skip ci]"
          file_pattern: "scripts/bluesky-posts.json"
