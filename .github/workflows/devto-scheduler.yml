name: Dev.to Scheduled Articles

on:
  schedule:
    - cron: '0 6 * * *' # Run once daily at 6 AM UTC (11:30 AM IST)
  workflow_dispatch: # Allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run scheduler
        run: |
          npx tsx scripts/devto-scheduled-executor.ts
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

      - name: Commit finished posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Dev.to article published [skip ci]"
          file_pattern: "scripts/devto-posts.json"
