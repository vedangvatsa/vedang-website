name: Hashnode Scheduled Articles

on:
  schedule:
    - cron: '0 8 * * *' # Run once daily at 8 AM UTC (1:30 PM IST)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run scheduler
        run: npx tsx scripts/hashnode-scheduled-executor.ts
        env:
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}

      - name: Commit finished posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Hashnode article published [skip ci]"
          file_pattern: "scripts/hashnode-posts.json"
