name: LinkedIn Scheduled Posts

on:
  schedule:
    - cron: '32 23,3,7,15 * * *' # Run at 05:02, 09:02, 13:02, 21:02 IST (post times: 04:57, 08:57, 12:57, 20:57)
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run LinkedIn scheduler
        id: scheduler
        run: |
          npx tsx scripts/linkedin-scheduled-executor.ts
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

      - name: Commit finished posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: LinkedIn posts status updated [skip ci]"
          file_pattern: "scripts/linkedin-posts.json"
