name: Social Media Scheduled Posts

on:
  schedule:
    - cron: "35 3,11,19 * * *" # 09:05, 17:05, 01:05 IST (3 runs/day)
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: social-queue
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Post to X (Twitter)
        run: npx tsx scripts/x-scheduled-executor.ts
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Post to LinkedIn
        run: npx tsx scripts/linkedin-scheduled-executor.ts
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

      - name: Discover viral LinkedIn posts
        continue-on-error: true
        run: npx tsx scripts/linkedin-discover-posts.ts
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

      - name: Comment on LinkedIn posts
        continue-on-error: true
        run: npx tsx scripts/linkedin-discover-and-comment.ts
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

      - name: Post to Bluesky
        run: npx tsx scripts/bluesky-scheduled-executor.ts
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Bluesky engagement comments
        continue-on-error: true
        run: npx tsx scripts/bluesky-engagement.ts
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}

      - name: Post to Facebook
        run: npx tsx scripts/facebook-scheduled-executor.ts
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}

      - name: Post to Instagram
        run: npx tsx scripts/instagram-scheduled-executor.ts
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}

      - name: Post to Threads
        run: npx tsx scripts/threads-scheduled-executor.ts
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      - name: Post to Tumblr
        run: npx tsx scripts/tumblr-scheduled-executor.ts
        env:
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
          TUMBLR_ACCESS_SECRET: ${{ secrets.TUMBLR_ACCESS_SECRET }}
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}

      - name: Post to Farcaster
        run: npx tsx scripts/farcaster-scheduled-executor.ts
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}

      - name: Farcaster engagement comments
        continue-on-error: true
        run: npx tsx scripts/farcaster-engagement.ts
        env:
          NEYNAR_API_KEY: ${{ secrets.NEYNAR_API_KEY }}
          NEYNAR_SIGNER_UUID: ${{ secrets.NEYNAR_SIGNER_UUID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post to Mastodon
        run: npx tsx scripts/mastodon-scheduled-executor.ts
        env:
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}

      - name: Publish to Dev.to
        run: npx tsx scripts/devto-scheduled-executor.ts
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

      - name: Publish to Hashnode
        run: npx tsx scripts/hashnode-scheduled-executor.ts
        env:
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}

      - name: Commit updated post files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: Social posts status updated [skip ci]"
          file_pattern: "scripts/*-posts.json scripts/*-comment-log.json scripts/linkedin-targets.json"
