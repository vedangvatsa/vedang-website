name: X Quote-Tweet Discovery

on:
  schedule:
    - cron: "30 1 * * *" # 07:00 IST daily
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Discover viral posts and generate quotes
        run: npx tsx scripts/x-discover-viral.ts
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Pull latest changes before commit
        run: git pull --rebase origin main || true

      - name: Commit quote posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: X quote tweets generated [skip ci]"
          file_pattern: "scripts/x-quote-posts.json"
