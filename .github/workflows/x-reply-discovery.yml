name: X Reply Discovery

on:
  schedule:
    - cron: "0 2 * * *" # 07:30 IST daily
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Discover viral posts and generate replies
        run: npx tsx scripts/x-discover-replies.ts
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Commit reply posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: X reply posts generated [skip ci]"
          file_pattern: "scripts/x-reply-posts.json"
