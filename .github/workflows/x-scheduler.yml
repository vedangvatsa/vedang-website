name: X (Twitter) Scheduled Posts

on:
  schedule:
    - cron: '35 19,3,11 * * *' # Run at 01:05, 09:05, 17:05 IST (post times: 01:00, 09:00, 17:00)
  workflow_dispatch: # Allow manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run scheduler
        id: scheduler
        run: |
          npx tsx scripts/x-scheduled-executor.ts
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}

      - name: Commit finished posts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated: X posts status updated [skip ci]"
          file_pattern: "scripts/x-posts.json"
