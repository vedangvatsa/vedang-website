<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .title { font-weight: 800; font-size: 22px; fill: #0f172a; text-anchor: middle; }
      .subtitle { font-weight: 600; font-size: 11px; fill: #64748b; text-anchor: middle; letter-spacing: 0.15em; }
      .country-box { rx: 8; fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .country-active { rx: 8; fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; }
      .text-dark { font-weight: 700; font-size: 14px; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-weight: 400; font-size: 10px; fill: #64748b; text-anchor: middle; }
      .text-stat { font-weight: 800; font-size: 18px; fill: #3b82f6; text-anchor: middle; }
      .text-blue { font-weight: 700; font-size: 14px; fill: #3b82f6; text-anchor: middle; }
      .center-box { rx: 10; fill: #1e293b; stroke: none; }
      .dashed { stroke: #cbd5e1; stroke-width: 1.5; stroke-dasharray: 4 3; fill: none; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" rx="16" />
  <text x="400" y="42" class="title">THE AGENTIC STATE</text>
  <text x="400" y="62" class="subtitle">DIGITAL GOVERNMENT LEADERS AND THEIR AI STRATEGIES</text>
  
  <!-- Center hub -->
  <rect x="300" y="130" width="200" height="60" class="center-box" />
  <text x="400" y="157" font-weight="700" font-size="11" fill="#ffffff" text-anchor="middle" font-family="Inter">INTEROPERABILITY BACKBONE</text>
  <text x="400" y="175" font-weight="400" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" font-family="Inter">X-Road · SingPass · MitID</text>
  
  <!-- Estonia -->
  <rect x="30" y="85" width="200" height="100" class="country-active" />
  <text x="130" y="115" class="text-blue">Estonia</text>
  <text x="130" y="133" class="text-stat">99%</text>
  <text x="130" y="148" class="text-sub">services digital</text>
  <text x="130" y="168" class="text-sub">Eesti.ai · €125M revenue</text>
  <line x1="230" y1="135" x2="300" y2="160" class="dashed" />
  
  <!-- Singapore -->
  <rect x="570" y="85" width="200" height="100" class="country-active" />
  <text x="670" y="115" class="text-blue">Singapore</text>
  <text x="670" y="133" class="text-stat">100K</text>
  <text x="670" y="148" class="text-sub">officers on Pair AI</text>
  <text x="670" y="168" class="text-sub">Smart Nation 2.0 · Ask Jamie</text>
  <line x1="570" y1="135" x2="500" y2="160" class="dashed" />
  
  <!-- UAE -->
  <rect x="30" y="230" width="200" height="100" class="country-box" />
  <text x="130" y="260" class="text-dark">UAE</text>
  <text x="130" y="278" class="text-stat">97%</text>
  <text x="130" y="293" class="text-sub">AI utilization rate</text>
  <text x="130" y="313" class="text-sub">AED 13B · AI-native gov by 2027</text>
  <line x1="230" y1="280" x2="350" y2="190" class="dashed" />
  
  <!-- Denmark -->
  <rect x="570" y="230" width="200" height="100" class="country-box" />
  <text x="670" y="260" class="text-dark">Denmark</text>
  <text x="670" y="278" class="text-stat">95%</text>
  <text x="670" y="293" class="text-sub">MitID citizen adoption</text>
  <text x="670" y="313" class="text-sub">Digital-first mandate · 2014</text>
  <line x1="570" y1="280" x2="450" y2="190" class="dashed" />
  
  <!-- Bottom insight -->
  <rect x="200" y="355" width="400" height="35" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />
  <text x="400" y="377" font-weight="600" font-size="11" fill="#334155" text-anchor="middle" font-family="Inter">Proactive agents replace forms, queues, and intermediaries</text>
</svg>
