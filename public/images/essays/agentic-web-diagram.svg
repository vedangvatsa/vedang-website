<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .title { font-weight: 800; font-size: 24px; fill: #111; }
      .subtitle { font-weight: 600; font-size: 14px; fill: #6b7280; letter-spacing: 0.1em; text-transform: uppercase; }
      .box { fill: #f3f4f6; stroke: #e5e7eb; stroke-width: 2; rx: 8; }
      .box-accent { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .box-text-title { font-weight: 800; font-size: 18px; fill: #111; }
      .box-text { font-weight: 400; font-size: 14px; fill: #4b5563; }
      .arrow { stroke: #9ca3af; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
    </marker>
  </defs>

  <!-- Left Side: Human Web -->
  <text x="180" y="40" class="subtitle" text-anchor="middle">Phase 1 &amp; 2: The Human Web</text>
  <rect x="40" y="60" width="280" height="180" class="box" />
  <text x="60" y="95" class="box-text-title">Attention Economy</text>
  <text x="60" y="125" class="box-text">• Browsing &amp; Scrolling</text>
  <text x="60" y="150" class="box-text">• Ad-driven Monetization</text>
  <text x="60" y="175" class="box-text">• Clickbait &amp; UX Loops</text>
  <text x="60" y="200" class="box-text">• Human Execution</text>

  <!-- Arrow -->
  <path d="M 340 150 L 450 150" class="arrow" />
  <text x="395" y="135" class="box-text" text-anchor="middle" font-style="italic">Evolution</text>

  <!-- Right Side: Agentic Web -->
  <text x="620" y="40" class="subtitle" text-anchor="middle">Phase 3: The Agentic Web</text>
  <rect x="480" y="60" width="280" height="180" class="box-accent" />
  <text x="500" y="95" class="box-text-title">Intention Economy</text>
  <text x="500" y="125" class="box-text">• Delegating &amp; Acting</text>
  <text x="500" y="150" class="box-text">• API &amp; Protocol-driven</text>
  <text x="500" y="175" class="box-text">• Verifiable Reputation</text>
  <text x="500" y="200" class="box-text">• Machine Execution</text>

</svg>
