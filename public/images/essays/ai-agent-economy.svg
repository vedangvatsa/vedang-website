<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f9fafb; stroke: #e5e7eb; stroke-width: 1; }
      .node { fill: #111; stroke: #fff; stroke-width: 2; }
      .node-blue { fill: #3b82f6; stroke: #fff; stroke-width: 2; }
      .line { stroke: #d1d5db; stroke-width: 2; }
      .line-blue { stroke: #bfdbfe; stroke-width: 2; }
      .text-title { font-weight: 800; font-size: 16px; fill: #111; text-anchor: middle; }
      .text-sub { font-weight: 400; font-size: 13px; fill: #6b7280; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Left Side: Hierarchy -->
  <rect x="50" y="50" width="300" height="300" rx="12" class="bg" />
  <text x="200" y="90" class="text-title">TRADITIONAL CORP</text>
  <text x="200" y="110" class="text-sub">Vertical Hierarchy</text>
  
  <path d="M 200 150 L 140 220 M 200 150 L 260 220" class="line" />
  <path d="M 140 220 L 100 280 M 140 220 L 180 280" class="line" />
  <path d="M 260 220 L 220 280 M 260 220 L 300 280" class="line" />
  
  <circle cx="200" cy="150" r="16" class="node" />
  <circle cx="140" cy="220" r="14" class="node" />
  <circle cx="260" cy="220" r="14" class="node" />
  <circle cx="100" cy="280" r="12" class="node" />
  <circle cx="180" cy="280" r="12" class="node" />
  <circle cx="220" cy="280" r="12" class="node" />
  <circle cx="300" cy="280" r="12" class="node" />

  <!-- Arrow -->
  <path d="M 370 200 L 430 200" style="stroke:#9ca3af; stroke-width: 3; fill: none; marker-end: url(#arrowhead);" />
  
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" />
  </marker>

  <!-- Right Side: Swarm -->
  <rect x="450" y="50" width="300" height="300" rx="12" class="bg" />
  <text x="600" y="90" class="text-title">AGENTIC WORKFORCE</text>
  <text x="600" y="110" class="text-sub">Decentralized Swarm</text>

  <path d="M 600 220 L 530 180 M 600 220 L 670 180 M 600 220 L 550 270 M 600 220 L 650 270 M 530 180 L 550 270 M 670 180 L 650 270" class="line-blue" />
  
  <circle cx="600" cy="220" r="20" class="node-blue" />
  <circle cx="530" cy="180" r="14" class="node-blue" />
  <circle cx="670" cy="180" r="14" class="node-blue" />
  <circle cx="550" cy="270" r="14" class="node-blue" />
  <circle cx="650" cy="270" r="14" class="node-blue" />
</svg>