<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
      text { font-family: 'Inter', sans-serif; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .bg { fill: #ffffff; }
      .path-line { stroke: #3b82f6; stroke-width: 4; fill: none; }
      .node { fill: #ffffff; stroke: #3b82f6; stroke-width: 3; }
      .text-title { font-weight: 800; font-size: 16px; fill: #1e293b; text-anchor: middle; }
      .text-sub { font-weight: 600; font-size: 13px; fill: #64748b; text-anchor: middle; }
      .focus-node { fill: #3b82f6; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE BLOCKCHAIN EVOLUTION</text>

  <!-- Step Path -->
  <path d="M 150 300 L 400 200 L 650 100" class="path-line" />

  <!-- Speculative Era -->
  <circle cx="150" cy="300" r="12" class="node" />
  <text x="150" y="330" class="text-title">Phase 1: Discovery</text>
  <text x="150" y="350" class="text-sub">Niche Asset &amp; Speculation</text>

  <!-- Infrastructure Era -->
  <circle cx="400" cy="200" r="12" class="node" />
  <text x="400" y="230" class="text-title">Phase 2: Infrastructure</text>
  <text x="400" y="250" class="text-sub">Smart Contracts &amp; Protocols</text>

  <!-- Foundational Era -->
  <circle cx="650" cy="100" r="16" class="focus-node" />
  <text x="650" y="140" class="text-title">Phase 3: Integration</text>
  <text x="650" y="160" class="text-sub">Global Financial Foundation</text>
</svg>