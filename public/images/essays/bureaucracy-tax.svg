<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
      .title { font-weight: 800; font-size: 24px; fill: #0f172a; text-anchor: middle; }
      .box { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 2; rx: 4; }
      .text-sub { font-weight: 600; font-size: 14px; fill: #334155; text-anchor: middle; }
      .line { stroke: #ef4444; stroke-width: 4; stroke-dasharray: 4 4; fill: none; }
      .path-text { font-weight: 800; font-size: 14px; fill: #ef4444; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" rx="16" />
  <text x="400" y="50" class="title">THE BUREAUCRACY TAX</text>
  
  <rect x="100" y="100" width="120" height="60" class="box" />
  <text x="160" y="136" class="text-sub">Action Intent</text>
  
  <rect x="340" y="240" width="120" height="60" class="box" />
  <text x="400" y="276" class="text-sub">Compliance Check</text>
  
  <rect x="580" y="100" width="120" height="60" class="box" />
  <text x="640" y="136" class="text-sub">Execution</text>
  
  <path d="M 220 130 C 280 130, 280 270, 340 270" class="line" />
  <path d="M 460 270 C 520 270, 520 130, 580 130" class="line" />
  
  <text x="400" y="200" class="path-text">Institutional Sclerosis (Friction)</text>
</svg>