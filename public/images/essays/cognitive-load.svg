<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .brain { fill: #fecdd3; stroke: #e11d48; stroke-width: 2; rx: 40; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; }
      .text-label { font-weight: 800; font-size: 14px; fill: #111; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE COGNITIVE LOAD CRISIS</text>
  
  <rect x="300" y="150" width="200" height="150" class="brain" />
  <text x="400" y="230" class="text-label" style="fill:#e11d48;">Human Attention</text>
  
  <path d="M 100 100 L 280 180" class="arrow" />
  <path d="M 120 220 L 280 220" class="arrow" />
  <path d="M 100 350 L 280 260" class="arrow" />
  <path d="M 700 100 L 520 180" class="arrow" />
  <path d="M 680 220 L 520 220" class="arrow" />
  <path d="M 700 350 L 520 260" class="arrow" />
  
  <text x="120" y="90" class="text-label">Social Media</text>
  <text x="100" y="210" class="text-label">Emails</text>
  <text x="120" y="370" class="text-label">Slack / Pings</text>
</svg>