<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 1; }
      .node-dark { fill: #0f172a; rx: 8; }
      .node-blue { fill: #eff6ff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .line { stroke: #cbd5e1; stroke-width: 3; stroke-dasharray: 6 6; }
      .line-solid { stroke: #3b82f6; stroke-width: 3; }
      .text-light { font-weight: 800; font-size: 16px; fill: #fff; text-anchor: middle; }
      .text-dark { font-weight: 800; font-size: 16px; fill: #0f172a; text-anchor: middle; }
      .text-sub { font-weight: 600; font-size: 13px; fill: #64748b; text-anchor: middle; }
      .title { font-weight: 800; font-size: 20px; fill: #0f172a; text-anchor: middle; letter-spacing: 0.05em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" class="bg" rx="16" />
  
  <text x="400" y="50" class="title">COMPUTATIONAL CONSTITUTIONS</text>
  <text x="400" y="70" class="text-sub">Executing Governance through Code</text>

  <!-- Legal Input -->
  <rect x="150" y="120" width="200" height="60" class="node-dark" />
  <text x="250" y="156" class="text-light">Legal Freedoms</text>
  
  <path d="M 250 180 L 250 250 M 250 250 L 350 280" class="line" />

  <!-- Cryptographic Input -->
  <rect x="450" y="120" width="200" height="60" class="node-dark" />
  <text x="550" y="156" class="text-light">Cryptographic Rules</text>

  <path d="M 550 180 L 550 250 M 550 250 L 450 280" class="line" />

  <!-- The Smart Contract Layer -->
  <rect x="250" y="270" width="300" height="60" class="node-blue" />
  <text x="400" y="306" class="text-dark">VERIFIABLE RIGHTS</text>
  
  <text x="250" y="220" class="text-sub" style="fill:#3b82f6;">Ambiguous</text>
  <text x="550" y="220" class="text-sub" style="fill:#3b82f6;">Rigid</text>

  <!-- Output Lock -->
  <rect x="385" y="255" width="30" height="30" rx="4" fill="#3b82f6" />
  <circle cx="400" cy="270" r="6" fill="#eff6ff" />
</svg>