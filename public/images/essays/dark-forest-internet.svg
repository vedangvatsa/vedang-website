<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #0f172a; }
      .title { font-weight: 800; font-size: 24px; fill: #ffffff; text-anchor: middle; }
      .bot { fill: #334155; }
      .human { fill: #10b981; }
      .text-label { font-weight: 800; font-size: 14px; fill: #94a3b8; text-anchor: middle; }
      .safe-zone { fill: none; stroke: #10b981; stroke-width: 2; stroke-dasharray: 4 4; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" rx="16" />
  <text x="400" y="50" class="title">THE DARK FOREST INTERNET</text>
  
  <circle cx="150" cy="150" r="20" class="bot" />
  <circle cx="650" cy="120" r="30" class="bot" />
  <circle cx="200" cy="300" r="15" class="bot" />
  <circle cx="700" cy="320" r="25" class="bot" />
  <circle cx="400" cy="150" r="10" class="bot" />
  <text x="150" y="190" class="text-label">AI Bots</text>
  <text x="650" y="170" class="text-label">Algorithm Scraping</text>

  <circle cx="400" cy="280" r="60" class="safe-zone" />
  <circle cx="380" cy="270" r="8" class="human" />
  <circle cx="420" cy="290" r="8" class="human" />
  <text x="400" y="360" class="text-label" style="fill:#10b981;">Cryptographically Verified Humans</text>
</svg>