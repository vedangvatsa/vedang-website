<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .wheel { fill: none; stroke: #94a3b8; stroke-width: 4; }
      .spoke { stroke: #cbd5e1; stroke-width: 2; }
      .runner { fill: #ef4444; }
      .text-label { font-weight: 800; font-size: 16px; fill: #1f2937; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE HUSTLE CAGE</text>
  
  <circle cx="400" cy="220" r="120" class="wheel" stroke-dasharray="10 10" />
  <circle cx="400" cy="220" r="140" class="wheel" />
  
  <line x1="400" y1="80" x2="400" y2="360" class="spoke" />
  <line x1="260" y1="220" x2="540" y2="220" class="spoke" />
  <line x1="300" y1="120" x2="500" y2="320" class="spoke" />
  <line x1="500" y1="120" x2="300" y2="320" class="spoke" />
  
  <circle cx="400" cy="340" r="10" class="runner" />
  
  <text x="200" y="225" class="text-label">Burnout</text>
  <text x="600" y="225" class="text-label">Illusion of Progress</text>
</svg>