<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #ffffff; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .bar { fill: #e5e7eb; rx: 8; }
      .bar-fill { fill: #3b82f6; rx: 8; }
      .text-label { font-weight: 800; font-size: 16px; fill: #111; text-anchor: middle; }
      .text-sub { font-weight: 600; font-size: 14px; fill: #3b82f6; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE IN-BETWEEN STATE</text>
  
  <text x="100" y="195" class="text-label">Human</text>
  <text x="700" y="195" class="text-label">Post-Human</text>
  
  <rect x="160" y="180" width="480" height="20" class="bar" />
  <rect x="160" y="180" width="240" height="20" class="bar-fill" />
  
  <path d="M 400 160 L 400 220" stroke="#111" stroke-width="2" />
  <text x="400" y="250" class="text-sub">Awkward Adolescence</text>
  <text x="400" y="270" class="text-sub" style="fill:#64748b; font-size:12px;">Enhanced, but not transformed</text>
</svg>