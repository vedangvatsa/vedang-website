<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .mesh-line { stroke: #cbd5e1; stroke-width: 2; }
      .mesh-node { fill: #10b981; }
      .text-label { font-weight: 800; font-size: 16px; fill: #1f2937; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE MESH ECONOMY</text>
  
  <path d="M 200 200 L 400 100 L 600 200 L 400 300 Z" class="mesh-line" />
  <path d="M 200 200 L 400 300 L 500 250 L 400 100" class="mesh-line" />
  <path d="M 300 150 L 500 150 L 500 250 L 300 250 Z" class="mesh-line" />
  
  <circle cx="200" cy="200" r="10" class="mesh-node" />
  <circle cx="400" cy="100" r="10" class="mesh-node" />
  <circle cx="600" cy="200" r="10" class="mesh-node" />
  <circle cx="400" cy="300" r="10" class="mesh-node" />
  <circle cx="300" cy="150" r="8" class="mesh-node" />
  <circle cx="500" cy="150" r="8" class="mesh-node" />
  <circle cx="500" cy="250" r="8" class="mesh-node" />
  <circle cx="300" cy="250" r="8" class="mesh-node" />
  
  <text x="400" y="360" class="text-label">Peer-to-Peer Resilient Value Exchange</text>
</svg>