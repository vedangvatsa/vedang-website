  <text x="835" y="278" font-family="system-ui" font-size="12" fill="#cbd5e1">Machine-readable summaries</text>
  <text x="835" y="296" font-family="system-ui" font-size="12" fill="#cbd5e1">API-first content access</text>
  <text x="835" y="314" font-family="system-ui" font-size="12" fill="#cbd5e1">Agent discovery protocols</text>
  <text x="835" y="332" font-family="system-ui" font-size="12" fill="#cbd5e1">Brand representation files</text>
  <text x="835" y="360" font-family="system-ui" font-size="11" fill="#94a3b8">Maturity</text>
