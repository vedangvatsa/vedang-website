<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
