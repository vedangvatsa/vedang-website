  <text x="75" y="215" font-family="system-ui" font-size="11" fill="#94a3b8">Key Files</text>
  <text x="75" y="233" font-family="system-ui" font-size="12" font-weight="500" fill="#e2e8f0">robots.txt, sitemap.xml, meta tags</text>
  <text x="75" y="260" font-family="system-ui" font-size="11" fill="#94a3b8">Tactics</text>
  <text x="75" y="278" font-family="system-ui" font-size="12" fill="#cbd5e1">Keyword optimization</text>
