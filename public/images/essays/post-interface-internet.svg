<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #f8fafc; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" rx="16" />

  <!-- Title -->
  <text x="400" y="36" font-weight="800" font-size="20" fill="#0f172a" text-anchor="middle">THE POST-INTERFACE INTERNET</text>
  <text x="400" y="54" font-weight="600" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="0.15em">FROM VISUAL BROWSING TO AGENTIC FULFILLMENT</text>

  <!-- Left: Legacy Web -->
  <rect x="40" y="75" width="340" height="180" rx="10" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" />
  <text x="210" y="100" font-weight="800" font-size="14" fill="#dc2626" text-anchor="middle">LEGACY WEB</text>

  <text x="70" y="125" font-weight="600" font-size="10" fill="#64748b">Primary User</text>
  <text x="280" y="125" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">Human Eyeballs</text>
  <line x1="70" y1="133" x2="350" y2="133" stroke="#e2e8f0" stroke-width="1" />

  <text x="70" y="153" font-weight="600" font-size="10" fill="#64748b">Data Format</text>
  <text x="280" y="153" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">HTML &amp; CSS</text>
  <line x1="70" y1="161" x2="350" y2="161" stroke="#e2e8f0" stroke-width="1" />

  <text x="70" y="181" font-weight="600" font-size="10" fill="#64748b">Monetization</text>
  <text x="280" y="181" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">Ads &amp; CPM</text>
  <line x1="70" y1="189" x2="350" y2="189" stroke="#e2e8f0" stroke-width="1" />

  <text x="70" y="209" font-weight="600" font-size="10" fill="#64748b">Discovery</text>
  <text x="280" y="209" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">SEO &amp; Keywords</text>
  <line x1="70" y1="217" x2="350" y2="217" stroke="#e2e8f0" stroke-width="1" />

  <text x="70" y="237" font-weight="600" font-size="10" fill="#64748b">Identity</text>
  <text x="280" y="237" font-weight="700" font-size="11" fill="#0f172a" text-anchor="end">Passwords &amp; CAPTCHA</text>

  <!-- Arrow -->
  <polygon points="400,140 400,200 430,170" fill="#0f172a" />

  <!-- Right: Agent Web -->
  <rect x="450" y="75" width="310" height="180" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" />
  <text x="605" y="100" font-weight="800" font-size="14" fill="#1d4ed8" text-anchor="middle">AGENT WEB</text>

  <text x="480" y="125" font-weight="600" font-size="10" fill="#64748b">Primary User</text>
  <text x="730" y="125" font-weight="700" font-size="11" fill="#1d4ed8" text-anchor="end">AI Agents / LLMs</text>
  <line x1="480" y1="133" x2="730" y2="133" stroke="#bfdbfe" stroke-width="1" />

  <text x="480" y="153" font-weight="600" font-size="10" fill="#64748b">Data Format</text>
  <text x="730" y="153" font-weight="700" font-size="11" fill="#1d4ed8" text-anchor="end">JSON &amp; APIs</text>
  <line x1="480" y1="161" x2="730" y2="161" stroke="#bfdbfe" stroke-width="1" />

  <text x="480" y="181" font-weight="600" font-size="10" fill="#64748b">Monetization</text>
  <text x="730" y="181" font-weight="700" font-size="11" fill="#1d4ed8" text-anchor="end">Tx Fees &amp; Usage</text>
  <line x1="480" y1="189" x2="730" y2="189" stroke="#bfdbfe" stroke-width="1" />

  <text x="480" y="209" font-weight="600" font-size="10" fill="#64748b">Discovery</text>
  <text x="730" y="209" font-weight="700" font-size="11" fill="#1d4ed8" text-anchor="end">AEO &amp; Semantic Logic</text>
  <line x1="480" y1="217" x2="730" y2="217" stroke="#bfdbfe" stroke-width="1" />

  <text x="480" y="237" font-weight="600" font-size="10" fill="#64748b">Identity</text>
  <text x="730" y="237" font-weight="700" font-size="11" fill="#1d4ed8" text-anchor="end">ZKP &amp; Crypto Attestation</text>

  <!-- Stats bar -->
  <rect x="40" y="275" width="170" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="125" y="298" font-weight="800" font-size="20" fill="#0f172a" text-anchor="middle">58%</text>
  <text x="125" y="318" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">internet traffic is M2M</text>

  <rect x="225" y="275" width="170" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="310" y="298" font-weight="800" font-size="20" fill="#0f172a" text-anchor="middle">-94%</text>
  <text x="310" y="318" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">display ad CPM (projected)</text>

  <rect x="410" y="275" width="170" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="495" y="298" font-weight="800" font-size="20" fill="#0f172a" text-anchor="middle">240%</text>
  <text x="495" y="318" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">agent protocol hire growth</text>

  <rect x="595" y="275" width="170" height="55" rx="8" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
  <text x="680" y="298" font-weight="800" font-size="20" fill="#1d4ed8" text-anchor="middle">$4.2B</text>
  <text x="680" y="318" font-weight="400" font-size="9" fill="#64748b" text-anchor="middle">agentic infra investment</text>

  <!-- Bottom banner -->
  <rect x="200" y="355" width="400" height="35" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" />
  <text x="400" y="377" font-weight="600" font-size="11" fill="#334155" text-anchor="middle">The GUI was a 40-year hack. The hack is ending.</text>
</svg>
