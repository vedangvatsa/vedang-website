<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 820" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #ffffff; }
      .title { font-weight: 800; font-size: 32px; fill: #0f172a; text-anchor: middle; }
      .pill { fill: #e2e8f0; rx: 20; }
      .subtitle { font-weight: 600; font-size: 18px; fill: #1e293b; text-anchor: middle; }
      .box { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .arrow { fill: #ffffff; stroke: #0f172a; stroke-width: 2; }
      .circle { fill: #ffffff; stroke: #0f172a; stroke-width: 3; }
      .table-header { fill: #e2e8f0; stroke: #0f172a; stroke-width: 2; }
      .table-cell { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; }
      .banner { fill: #e2e8f0; stroke: #0f172a; stroke-width: 2; rx: 8; }
    </style>
  </defs>
  <rect width="800" height="820" class="bg" />

  <!-- Title & Subtitle -->
  <text x="400" y="50" class="title">Post-Scarcity Technology</text>
  <rect x="180" y="70" width="440" height="40" class="pill" />
  <text x="400" y="96" class="subtitle">When marginal costs approach zero</text>

  <!-- Arrows -->
  <!-- Top Arrow -->
  <polygon points="340,140 460,140 460,280 510,280 400,400 290,280 340,280" class="arrow" />
  <!-- Left Arrow -->
  <polygon points="140,340 280,340 280,290 400,400 280,510 280,460 140,460" class="arrow" />
  <!-- Right Arrow -->
  <polygon points="660,340 520,340 520,290 400,400 520,510 520,460 660,460" class="arrow" />

  <!-- Center Circle -->
  <circle cx="400" cy="400" r="95" class="circle" />
  <text x="400" y="395" font-weight="800" font-size="22" fill="#0f172a" text-anchor="middle">Structural</text>
  <text x="400" y="425" font-weight="800" font-size="22" fill="#0f172a" text-anchor="middle">Deflation</text>

  <!-- Icons -->
  <!-- Top Icon (Energy) -->
  <g transform="translate(376, 170) scale(2)">
    <rect x="2" y="6" width="20" height="12" rx="1" fill="none" stroke="#0f172a" stroke-width="1.5" />
    <line x1="2" y1="12" x2="22" y2="12" stroke="#0f172a" stroke-width="1.5" />
    <line x1="8" y1="6" x2="8" y2="18" stroke="#0f172a" stroke-width="1.5" />
    <line x1="16" y1="6" x2="16" y2="18" stroke="#0f172a" stroke-width="1.5" />
    <path d="M 12,22 L 12,18 M 8,22 L 16,22" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 12,2 L 12,4 M 6,3 L 7,5 M 18,3 L 17,5" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" />
  </g>
  <!-- Left Icon (Intelligence) -->
  <g transform="translate(186, 370) scale(2)">
    <path d="M9.5 2c-1.8 0-3.3 1.3-3.5 3-.6 0-1.2.2-1.7.6C3.5 6.4 3 7.6 3 9c0 1.5.8 2.8 2 3.5-.2.5-.2 1 0 1.5.3 1 1 1.8 2 2.2V18c0 .6.4 1 1 1h8c.6 0 1-.4 1-1v-1.8c1-.4 1.7-1.2 2-2.2.2-.5.2-1 0-1.5 1.2-.7 2-2 2-3.5 0-1.4-.5-2.6-1.3-3.4-.5-.4-1.1-.6-1.7-.6-.2-1.7-1.7-3-3.5-3-1.4 0-2.6.8-3.2 2-.6-1.2-1.8-2-3.2-2z" fill="none" stroke="#0f172a" stroke-width="1.5" />
    <path d="M12 2v18" fill="none" stroke="#0f172a" stroke-width="1.5" />
  </g>
  <!-- Right Icon (Digital Goods) -->
  <g transform="translate(566, 370) scale(2)">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="#0f172a" stroke-width="1.5" />
    <path d="M14 2v6h6" fill="none" stroke="#0f172a" stroke-width="1.5" />
    <path d="M10 13l-2 2 2 2" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M14 17l2-2-2-2" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Text Boxes -->
  <!-- Energy Box -->
  <rect x="480" y="140" width="230" height="90" class="box" rx="6" />
  <text x="495" y="165" font-weight="800" font-size="18" fill="#0f172a">Energy</text>
  <text x="495" y="190" font-size="14" fill="#334155">Solar LCOE down</text>
  <text x="495" y="210" font-size="14" fill="#334155">97% since 2010</text>

  <!-- Intelligence Box -->
  <rect x="60" y="480" width="220" height="90" class="box" rx="6" />
  <text x="75" y="505" font-weight="800" font-size="18" fill="#0f172a">Intelligence</text>
  <text x="75" y="530" font-size="14" fill="#334155">AI inference cost</text>
  <text x="75" y="550" font-size="14" fill="#334155">down 75%+ per year</text>

  <!-- Digital Goods Box -->
  <rect x="520" y="480" width="220" height="90" class="box" rx="6" />
  <text x="535" y="505" font-weight="800" font-size="18" fill="#0f172a">Digital Goods</text>
  <text x="535" y="530" font-size="14" fill="#334155">Production + distribution</text>
  <text x="535" y="550" font-size="14" fill="#334155">near zero</text>

  <!-- Table -->
  <g transform="translate(0, 590)">
    <path d="M 200,0 L 400,0 L 400,35 L 200,35 Z" class="table-header" />
    <path d="M 400,0 L 600,0 L 600,35 L 400,35 Z" class="table-header" />
    <text x="300" y="23" font-weight="800" font-size="16" fill="#0f172a" text-anchor="middle">Abundant</text>
    <text x="500" y="23" font-weight="800" font-size="16" fill="#0f172a" text-anchor="middle">Still Scarce</text>

    <path d="M 200,35 L 400,35 L 400,125 L 200,125 Z" class="table-cell" />
    <path d="M 400,35 L 600,35 L 600,125 L 400,125 Z" class="table-cell" />
    <text x="300" y="65" font-size="16" fill="#334155" text-anchor="middle">Intelligence</text>
    <text x="300" y="90" font-size="16" fill="#334155" text-anchor="middle">Energy</text>
    <text x="300" y="115" font-size="16" fill="#334155" text-anchor="middle">Digital</text>
    <text x="500" y="65" font-size="16" fill="#334155" text-anchor="middle">Land</text>
    <text x="500" y="90" font-size="16" fill="#334155" text-anchor="middle">Minerals</text>
    <text x="500" y="115" font-size="16" fill="#334155" text-anchor="middle">Attention</text>
  </g>

  <!-- Bottom Banner -->
  <rect x="100" y="745" width="600" height="46" class="banner" />
  <text x="400" y="774" font-weight="800" font-size="18" fill="#0f172a" text-anchor="middle">The question is not production. It is distribution.</text>
</svg>
