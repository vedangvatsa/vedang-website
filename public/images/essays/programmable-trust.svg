<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #ffffff; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .box { fill: #10b981; rx: 8; opacity: 0.1; }
      .box-outline { fill: none; stroke: #10b981; stroke-width: 3; rx: 8; }
      .lock { fill: #10b981; }
      .text-label { font-weight: 800; font-size: 16px; fill: #111; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">PROGRAMMABLE TRUST</text>
  
  <rect x="250" y="100" width="300" height="200" class="box" />
  <rect x="250" y="100" width="300" height="200" class="box-outline" stroke-dasharray="6 6" />
  
  <rect x="360" y="160" width="80" height="60" class="lock" rx="4" />
  <circle cx="400" cy="160" r="20" fill="none" stroke="#10b981" stroke-width="8" />
  
  <text x="400" y="260" class="text-label" style="fill:#10b981">Zero-Knowledge Environment</text>
  <text x="400" y="340" class="text-label">Verifiable Truth Without Disclosure</text>
</svg>