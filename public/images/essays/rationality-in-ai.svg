<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .scale { fill: #e5e7eb; }
      .balance { fill: #3b82f6; }
      .text-label { font-weight: 800; font-size: 16px; fill: #111; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">RATIONALITY IN AI</text>
  
  <rect x="390" y="150" width="20" height="150" class="scale" />
  <polygon points="400,130 150,150 650,150" class="balance" />
  
  <circle cx="150" cy="180" r="30" class="scale" />
  <circle cx="650" cy="180" r="30" class="scale" />
  
  <text x="150" y="240" class="text-label">Value Alignment</text>
  <text x="650" y="240" class="text-label">Decision Theory</text>
</svg>