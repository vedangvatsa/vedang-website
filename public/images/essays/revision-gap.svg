<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #ffffff; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .path-ai { stroke: #ef4444; stroke-width: 4; fill: none; }
      .path-human { stroke: #3b82f6; stroke-width: 4; fill: none; }
      .text-label { font-weight: 800; font-size: 14px; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE REVISION GAP</text>
  
  <path d="M 100 300 Q 150 150 700 150" class="path-ai" />
  <path d="M 100 300 Q 200 350 300 250 T 500 280 T 700 150" class="path-human" />
  
  <text x="100" y="340" class="text-label" style="fill:#111">First Draft</text>
  <text x="700" y="130" class="text-label" style="fill:#111">Final Version</text>
  
  <text x="400" y="140" class="text-label" style="fill:#ef4444">Machine Output (Instant, Flat)</text>
  <text x="400" y="300" class="text-label" style="fill:#3b82f6">Human Revision (Iterative, Deep)</text>
</svg>