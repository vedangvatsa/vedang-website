  <circle cx="400" cy="220" r="120" class="ring" />
  <circle cx="400" cy="220" r="90" class="ring" />
  <circle cx="400" cy="220" r="60" class="ring" />
  
  <circle cx="400" cy="220" r="20" class="core" />
  <path d="M 400 60 L 400 380 M 240 220 L 560 220" class="ring" stroke-dasharray="4 4" />
  
