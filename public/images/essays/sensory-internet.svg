<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .wave { fill: none; stroke: #3b82f6; stroke-width: 2; }
      .text-label { font-weight: 800; font-size: 14px; fill: #334155; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE SENSORY INTERNET</text>
  
  <path d="M 200 200 C 300 100, 300 300, 400 200 C 500 100, 500 300, 600 200" class="wave" stroke-width="4" />
  <path d="M 200 200 C 300 50, 300 350, 400 200 C 500 50, 500 350, 600 200" class="wave" opacity="0.5" />
  <path d="M 200 200 C 300 150, 300 250, 400 200 C 500 150, 500 250, 600 200" class="wave" opacity="0.8" />
  
  <text x="200" y="240" class="text-label">Visual/Audio</text>
  <text x="400" y="240" class="text-label">Haptics</text>
  <text x="600" y="240" class="text-label">Direct Neural</text>
</svg>