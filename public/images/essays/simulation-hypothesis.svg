<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #000; }
      .title { font-weight: 800; font-size: 24px; fill: #10b981; text-anchor: middle; }
      .grid { stroke: #10b981; stroke-width: 1; opacity: 0.3; }
      .text-label { font-weight: 800; font-size: 16px; fill: #10b981; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE SIMULATION HYPOTHESIS</text>
  
  <g transform="translate(0, 100)">
    <path d="M 0 0 L 800 0 M 0 50 L 800 50 M 0 100 L 800 100 M 0 150 L 800 150 M 0 200 L 800 200 M 0 250 L 800 250" class="grid" />
    <path d="M 100 0 L 100 300 M 200 0 L 200 300 M 300 0 L 300 300 M 400 0 L 400 300 M 500 0 L 500 300 M 600 0 L 600 300 M 700 0 L 700 300" class="grid" />
  </g>
  
  <rect x="250" y="150" width="300" height="100" fill="#000" stroke="#10b981" stroke-width="2" />
  <text x="400" y="205" class="text-label">> SYSTEM.INITIALIZE()</text>
</svg>