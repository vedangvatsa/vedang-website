<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #ffffff; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .step { fill: #ef4444; }
      .curve { stroke: #ef4444; stroke-width: 4; fill: none; }
      .text-label { font-weight: 800; font-size: 14px; fill: #111; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE ECONOMIC MIRACLE (SINGAPORE)</text>
  
  <path d="M 100 300 C 300 300, 350 100, 700 100" class="curve" />
  
  <circle cx="100" cy="300" r="10" class="step" />
  <text x="100" y="330" class="text-label">Fishing Village</text>
  
  <circle cx="400" cy="200" r="10" class="step" />
  <text x="400" y="230" class="text-label">Institutional Discipline</text>
  
  <circle cx="700" cy="100" r="10" class="step" />
  <text x="700" y="130" class="text-label">Global Hub</text>
</svg>