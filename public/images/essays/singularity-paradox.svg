<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .wall { fill: none; stroke: #1f2937; stroke-width: 4; }
      .vision { stroke: #3b82f6; stroke-width: 2; stroke-dasharray: 4 4; fill: none; }
      .text-label { font-weight: 800; font-size: 14px; fill: #fff; text-anchor: middle; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE SINGULARITY PARADOX</text>
  
  <path d="M 400 100 L 400 350" class="wall" />
  
  <path d="M 100 225 L 380 225" class="vision" />
  <circle cx="100" cy="225" r="8" fill="#1f2937" />
  
  <rect x="350" y="100" width="100" height="250" fill="#1f2937" />
  <text x="400" y="230" class="text-label">Event Horizon</text>
  
  <text x="240" y="215" class="text-label" style="fill:#111">Human Prediction</text>
  <text x="600" y="230" class="text-label" style="fill:#94a3b8">Unknowable Future</text>
</svg>