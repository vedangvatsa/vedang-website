<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&amp;display=swap');
      text { font-family: 'Inter', sans-serif; }
      .bg { fill: #fafafa; }
      .title { font-weight: 800; font-size: 24px; fill: #111; text-anchor: middle; }
      .box { fill: #ffffff; stroke: #3b82f6; stroke-width: 2; rx: 8; }
      .text-label { font-weight: 800; font-size: 16px; fill: #334155; text-anchor: middle; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-dasharray: 4 4; }
    </style>
  </defs>
  <rect width="800" height="400" class="bg" />
  <text x="400" y="50" class="title">THE SUBSTRATE SHIFT</text>
  
  <rect x="100" y="150" width="150" height="80" class="box" />
  <text x="175" y="195" class="text-label">Silicon</text>
  
  <rect x="325" y="150" width="150" height="80" class="box" />
  <text x="400" y="195" class="text-label">Photonic</text>
  
  <rect x="550" y="150" width="150" height="80" class="box" />
  <text x="625" y="195" class="text-label">Biological / DNA</text>
  
  <path d="M 250 190 L 325 190" class="arrow" />
  <path d="M 475 190 L 550 190" class="arrow" />
</svg>