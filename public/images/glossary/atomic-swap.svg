  <g>
    <rect x="100" y="275" width="600" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="100" y="275" width="600" height="50" rx="6" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="304.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">An atomic swap is a trustless peer-</text>
<rect x="140" y="210" width="520" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="140" y="210" width="520" height="50" rx="6" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="221" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">To -peer exchange of cryptocurrencies across different</text>
<text x="400" y="239.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">blockchains using cryptographic hash locks and time</text>
<text x="400" y="258.8" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">locks, ensuring</text>
<line x1="400" y1="275" x2="400" y2="265" stroke="#2563eb" stroke-width="3"/>
<rect x="180" y="145" width="440" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="180" y="145" width="440" height="50" rx="6" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="165.45000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">That either both parties receive their assets or</text>
<text x="400" y="184.35000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">neither does, no intermediary required</text>
<line x1="400" y1="210" x2="400" y2="200" stroke="#2563eb" stroke-width="3"/>
<rect x="220" y="80" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="220" y="80" width="360" height="50" rx="6" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="100.45" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">The mechanism uses Hash Time-Locked</text>
<text x="400" y="119.35000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Contracts (HTLCs)</text>
<line x1="400" y1="145" x2="400" y2="135" stroke="#2563eb" stroke-width="3"/>

