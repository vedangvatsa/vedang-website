<rect x="405" y="265" width="230" height="90" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="405" y="265" width="230" height="90" rx="10" fill="rgba(147,51,234,0.06)"/>
<text x="520" y="305.45" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Higher scores mean stronger</text>
<text x="520" y="324.34999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">relevance</text>
<rect x="300" y="65" width="200" height="70" rx="35" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
