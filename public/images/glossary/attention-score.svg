<rect x="165" y="265" width="230" height="90" rx="10" fill="rgba(147,51,234,0.06)"/>
<text x="280" y="286.54999999999995" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">In the transformer attention</text>
<text x="280" y="305.44999999999993" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">mechanism, each position</text>
<text x="280" y="324.34999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">computes a Query vector</text>
<text x="280" y="343.24999999999994" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">asking 'what am I looking...</text>
