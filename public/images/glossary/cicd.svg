<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <g transform="translate(0, 80)">
    <rect x="190" y="20" width="420" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="190" y="20" width="420" height="60" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="400" y="45.449999999999996" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">CI/CD stands for Continuous Integration and Continuous</text>
<text x="400" y="64.35000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Deployment</text>
<line x1="400" y1="83" x2="400" y2="92" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="190" y="100" width="420" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="190" y="100" width="420" height="60" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="400" y="125.45" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Continuous Integration means code changes are</text>
<text x="400" y="144.35" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">automatically tested as soon as they're committed</text>
<line x1="400" y1="163" x2="400" y2="172" stroke="#059669" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="190" y="180" width="420" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="190" y="180" width="420" height="60" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="400" y="205.45000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">You push code, the CI system checks it out, runs tests,</text>
<text x="400" y="224.35000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">lints it, builds it</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#52525b" text-anchor="end">veda.ng</text>
</svg>