<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <g>
    <rect x="100" y="30" width="360" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="100" y="30" width="360" height="80" rx="8" fill="rgba(147,51,234,0.06)"/>
<text x="280" y="54" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">CLIP (Contrastive Language-Image</text>
<text x="280" y="75.6" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">Pre-training) is a multimodal model from</text>
<text x="280" y="97.19999999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">OpenAI</text>
<path d="M 280 110 C 280 125, 520 125, 520 128" fill="none" stroke="#9333ea" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="340" y="140" width="360" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="340" y="140" width="360" height="80" rx="8" fill="rgba(147,51,234,0.06)"/>
<text x="520" y="153.2" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">That learns to connect images and text in</text>
<text x="520" y="174.79999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">a shared embedding space through</text>
<text x="520" y="196.4" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">contrastive learning on 400 million</text>
<text x="520" y="218" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">image-text pairs scraped from the internet</text>
<path d="M 520 220 C 520 235, 280 235, 280 238" fill="none" stroke="#9333ea" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="100" y="250" width="360" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="100" y="250" width="360" height="80" rx="8" fill="rgba(147,51,234,0.06)"/>
<text x="280" y="263.20000000000005" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">The architecture consists of separate</text>
<text x="280" y="284.80000000000007" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">image and text encoders (typically a</text>
<text x="280" y="306.40000000000003" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">Vision Transformer and a text transformer)</text>
<text x="280" y="328.00000000000006" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">trained</text>

  </g>
  
  <rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="385" font-family="'Inter',sans-serif" font-weight="600" font-size="12" fill="#52525b" text-anchor="end">@vedangvatsa</text>
</svg>