<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <g>
    <rect x="100" y="30" width="360" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="100" y="30" width="360" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="280" y="75.6" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">Containerization packages software</text>
<path d="M 280 110 C 280 125, 520 125, 520 128" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="340" y="140" width="360" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="340" y="140" width="360" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="520" y="174.79999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">So it runs identically on any machine with</text>
<text x="520" y="196.39999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">the container runtime</text>
<path d="M 520 220 C 520 235, 280 235, 280 238" fill="none" stroke="#059669" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="100" y="250" width="360" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="100" y="250" width="360" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="280" y="274" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">A container bundles application code,</text>
<text x="280" y="295.6" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">runtime libraries, system tools, and</text>
<text x="280" y="317.2" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#52525b" text-anchor="middle">settings into a single lightweight unit</text>

  </g>
  
  <rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="385" font-family="'Inter',sans-serif" font-weight="600" font-size="12" fill="#52525b" text-anchor="end">@vedangvatsa</text>
</svg>