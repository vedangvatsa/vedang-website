<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  
  <g>
    <circle cx="65" cy="130" r="20" fill="#ffffff" stroke="#9333ea" stroke-width="1.5"/>
<text x="65" y="135" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#9333ea" text-anchor="middle">1</text>
<rect x="40" y="70" width="340" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="100" y="104.875" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">Cross-entropy loss is the</text>
<text x="100" y="125.125" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">standard objective function</text>
<text x="100" y="145.375" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">for training classification</text>
<text x="100" y="165.625" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">and language models,...</text>
<circle cx="445" cy="130" r="20" fill="#ffffff" stroke="#9333ea" stroke-width="1.5"/>
<text x="445" y="135" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#9333ea" text-anchor="middle">2</text>
<rect x="420" y="70" width="340" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="480" y="104.875" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">For a single prediction,</text>
<text x="480" y="125.125" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">cross-entropy equals the</text>
<text x="480" y="145.375" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">negative logarithm of the</text>
<text x="480" y="165.625" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">probability assigned</text>
<circle cx="65" cy="280" r="20" fill="#ffffff" stroke="#9333ea" stroke-width="1.5"/>
<text x="65" y="285" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#9333ea" text-anchor="middle">3</text>
<rect x="40" y="220" width="340" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="100" y="265" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">To the correct class . High</text>
<text x="100" y="285.25" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">confidence in correct</text>
<text x="100" y="305.5" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">answers yields low loss</text>
<circle cx="445" cy="280" r="20" fill="#ffffff" stroke="#9333ea" stroke-width="1.5"/>
<text x="445" y="285" font-family="'Inter',sans-serif" font-weight="500" font-size="16" fill="#9333ea" text-anchor="middle">4</text>
<rect x="420" y="220" width="340" height="120" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="480" y="275.125" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">Low confidence yields high</text>
<text x="480" y="295.375" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="start">loss</text>

  </g>
  
  <rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="385" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#787774" text-anchor="end">@vedangvatsa</text>
</svg>