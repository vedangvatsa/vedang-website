<rect x="450" y="235" width="280" height="90" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="590" y="266" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Three properties matter .</text>
<text x="590" y="284.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">First, it is deterministic,</text>
