<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <g transform="translate(0, 80)">
    <rect x="190" y="20" width="420" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="190" y="20" width="420" height="60" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="26.549999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Decentralized Identity (DID) is an architectural change in</text>
<text x="400" y="45.449999999999996" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">how identity, credentials, and reputation are managed,</text>
<text x="400" y="64.35000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">moving control away from centralized tech companies and</text>
<text x="400" y="83.25" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">back into the hands of the individual user</text>
<line x1="400" y1="83" x2="400" y2="92" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="190" y="100" width="420" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="190" y="100" width="420" height="60" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="134.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">In Web2, identity is heavily fractionalized and rented</text>
<line x1="400" y1="163" x2="400" y2="172" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="190" y="180" width="420" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="190" y="180" width="420" height="60" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="196" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">You sign into services using Google, Facebook, or Apple</text>
<text x="400" y="214.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">credentials, and these mega-corporations retain absolute</text>
<text x="400" y="233.8" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">power</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#52525b" text-anchor="end">veda.ng</text>
</svg>