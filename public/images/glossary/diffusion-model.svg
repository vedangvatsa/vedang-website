<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#09090b">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#a1a1aa" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#09090b"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <text x="400" y="45" font-family="'Inter',sans-serif" font-weight="800" font-size="28" fill="#fafafa" text-anchor="middle" letter-spacing="-0.5">Diffusion Model</text>
  <text x="400" y="70" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#a855f7" text-anchor="middle" letter-spacing="2" text-transform="uppercase">Deconstructed: AI Concept</text>
  <line x1="200" y1="85" x2="600" y2="85" stroke="#27272a" stroke-width="1.5" opacity="0.5"/>
  
  <g transform="translate(0, 100)">
    <circle cx="80" cy="80" r="15" fill="#a855f7"/>
<text x="80" y="85" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#09090b" text-anchor="middle">1</text>
<rect x="60" y="35" width="320" height="90" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
<rect x="60" y="35" width="320" height="90" rx="6" fill="rgba(168,85,247,0.1)"/>
<text x="105" y="84.55" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">A diffusion model generates data</text>
<circle cx="440" cy="80" r="15" fill="#a855f7"/>
<text x="440" y="85" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#09090b" text-anchor="middle">2</text>
<rect x="420" y="35" width="320" height="90" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
<rect x="420" y="35" width="320" height="90" rx="6" fill="rgba(168,85,247,0.1)"/>
<text x="465" y="58.224999999999994" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">By learning to reverse a gradual</text>
<text x="465" y="75.77499999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">noising process, iteratively</text>
<text x="465" y="93.325" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">denoising random noise into</text>
<text x="465" y="110.875" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">coherent samples through many...</text>
<circle cx="80" cy="200" r="15" fill="#a855f7"/>
<text x="80" y="205" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#09090b" text-anchor="middle">3</text>
<rect x="60" y="155" width="320" height="90" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
<rect x="60" y="155" width="320" height="90" rx="6" fill="rgba(168,85,247,0.1)"/>
<text x="105" y="187" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">The forward diffusion process</text>
<text x="105" y="204.55" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">progressively adds Gaussian</text>
<text x="105" y="222.1" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">noise</text>
<circle cx="440" cy="200" r="15" fill="#a855f7"/>
<text x="440" y="205" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#09090b" text-anchor="middle">4</text>
<rect x="420" y="155" width="320" height="90" rx="6" fill="#09090b" stroke="#27272a" stroke-width="1.5"/>
<rect x="420" y="155" width="320" height="90" rx="6" fill="rgba(168,85,247,0.1)"/>
<text x="465" y="178.22500000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">To training data over many steps</text>
<text x="465" y="195.77500000000003" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">until the original signal is</text>
<text x="465" y="213.32500000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">completely destroyed, leaving</text>
<text x="465" y="230.87500000000003" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">pure noise</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#09090b" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#a1a1aa" text-anchor="end">veda.ng</text>
</svg>