<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(37,99,235,0.06)"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#e5e7eb" opacity="0.8"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  <rect x="0" y="0" width="800" height="400" fill="url(#glow)"/>
  
  <!-- Visual Architecture -->
  <g transform="translate(0, -20)">
    <circle cx="340" cy="180" r="80" fill="#2563eb" opacity="0.15" stroke="#2563eb" stroke-width="2"/>
<circle cx="460" cy="180" r="80" fill="#2563eb" opacity="0.25" stroke="#2563eb" stroke-width="2"/>
<circle cx="400" cy="100" r="80" fill="#2563eb" opacity="0.35" stroke="#2563eb" stroke-width="2"/>

  </g>

  <!-- Typography Card Section at Bottom -->
  <rect x="0" y="300" width="800" height="100" fill="#ffffff" opacity="0.95"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#e5e7eb" stroke-opacity="1" stroke-width="1.5"/>
  
  <text x="400" y="335" font-family="'Inter',sans-serif" font-weight="600" font-size="12" fill="#2563eb" text-anchor="middle" letter-spacing="2" text-transform="uppercase">Web3 GLOSSARY</text>
  <text x="400" y="370" font-family="'Inter',sans-serif" font-weight="700" font-size="28" fill="#09090b" text-anchor="middle" letter-spacing="-0.5">Dust Attack</text>
</svg>