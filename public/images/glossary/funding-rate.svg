<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
<defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M 0 0 L 6 3 L 0 6 z" fill="#2563eb"/></marker></defs>
<rect width="800" height="400" fill="#ffffff"/>
<g>
  <!-- Positive funding -->
  <rect x="100" y="100" width="260" height="100" rx="10" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="230" y="140" font-family="'Inter',sans-serif" font-weight="700" font-size="18" fill="#10b981" text-anchor="middle">Perp &gt; Spot</text>
  <text x="230" y="170" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#787774" text-anchor="middle">Longs pay Shorts</text>
  <text x="230" y="195" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#787774" text-anchor="middle">Pushes price ↓</text>

  <!-- Negative funding -->
  <rect x="440" y="100" width="260" height="100" rx="10" fill="#ffffff" stroke="#ef4444" stroke-width="2"/>
  <text x="570" y="140" font-family="'Inter',sans-serif" font-weight="700" font-size="18" fill="#ef4444" text-anchor="middle">Perp &lt; Spot</text>
  <text x="570" y="170" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#787774" text-anchor="middle">Shorts pay Longs</text>
  <text x="570" y="195" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#787774" text-anchor="middle">Pushes price ↑</text>

  <text x="400" y="270" font-family="'Inter',sans-serif" font-weight="600" font-size="18" fill="#2563eb" text-anchor="middle">Keeps perpetual price ≈ spot price</text>
  <text x="400" y="310" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#37352f" text-anchor="middle">Sentiment indicator + yield source</text>
</g>
<rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
<text x="770" y="385" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#787774" text-anchor="end">@vedangvatsa</text>
</svg>