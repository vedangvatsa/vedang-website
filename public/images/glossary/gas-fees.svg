  <rect width="800" height="400" fill="#ffffff"/>
  <g transform="translate(0,-32)"><rect x="80" y="130" width="140" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/><text x="150" y="167" font-family="'Inter',sans-serif" font-weight="600" font-size="18" fill="#37352f" text-anchor="middle">Transaction</text><line x1="225" y1="160" x2="290" y2="160" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/><rect x="300" y="100" width="200" height="140" rx="12" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="400" y="140" font-family="'Inter',sans-serif" font-weight="700" font-size="20" fill="#2563eb" text-anchor="middle">Gas Required</text><rect x="330" y="160" width="140" height="20" rx="4" fill="#e5e7eb"/><rect x="330" y="160" width="98" height="20" rx="4" fill="#2563eb"/><text x="400" y="215" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#787774" text-anchor="middle">21,000 units</text><text x="540" y="170" font-family="'Inter',sans-serif" font-weight="800" font-size="28" fill="#2563eb" text-anchor="middle">×</text><rect x="580" y="130" width="140" height="60" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/><text x="650" y="167" font-family="'Inter',sans-serif" font-weight="700" font-size="18" fill="#2563eb" text-anchor="middle">30 gwei</text><text x="400" y="280" font-family="'Inter',sans-serif" font-weight="800" font-size="28" fill="#37352f" text-anchor="middle">= 0.00063 ETH</text><text x="400" y="340" font-family="'Inter',sans-serif" font-weight="600" font-size="20" fill="#37352f" text-anchor="middle">Fee = Gas Units × Gas Price</text></g>
