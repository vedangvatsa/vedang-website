<text x="400" y="125.45" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">That controls the learning process but is not learned from</text>
<text x="400" y="144.35" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">data</text>
