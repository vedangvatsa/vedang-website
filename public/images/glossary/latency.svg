<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  <rect width="800" height="400" fill="url(#grid)"/>
  
  <g>
    <rect x="100" y="275" width="600" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="100" y="275" width="600" height="50" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="400" y="286" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Latency measures the time delay between initiating a request and</text>
<text x="400" y="304.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">receiving a response, a critical metric for user experience and</text>
<text x="400" y="323.8" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">system design</text>
<rect x="140" y="210" width="520" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="140" y="210" width="520" height="50" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="400" y="230.45000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">In AI systems, latency breaks down into several</text>
<text x="400" y="249.35000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">components: network latency (time for data</text>
<line x1="400" y1="275" x2="400" y2="265" stroke="#9333ea" stroke-width="3"/>
<rect x="180" y="145" width="440" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="180" y="145" width="440" height="50" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="400" y="156" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">To travel between client and server), queue</text>
<text x="400" y="174.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">latency (time waiting for processing resources),</text>
<text x="400" y="193.8" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">and inference latency (time for the model</text>
<line x1="400" y1="210" x2="400" y2="200" stroke="#9333ea" stroke-width="3"/>
<rect x="220" y="80" width="360" height="50" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="220" y="80" width="360" height="50" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="400" y="81.55000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">To generate output) . First-token</text>
<text x="400" y="100.45000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">latency measures time until the first</text>
<text x="400" y="119.35000000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">token appears, critical for perceived</text>
<text x="400" y="138.25000000000003" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">responsiveness</text>
<line x1="400" y1="145" x2="400" y2="135" stroke="#9333ea" stroke-width="3"/>

  </g>
  
  <rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="385" font-family="'Inter',sans-serif" font-weight="600" font-size="12" fill="#52525b" text-anchor="end">@vedangvatsa</text>
</svg>