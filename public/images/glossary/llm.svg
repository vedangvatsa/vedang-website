<rect x="407.5" y="90" width="175" height="180" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="495" y="166" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">Examples include</text>
<text x="495" y="184.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#52525b" text-anchor="middle">GPT-4, Claude,</text>
