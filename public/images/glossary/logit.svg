<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <g transform="translate(0, 80)">
    <circle cx="80" cy="80" r="15" fill="#9333ea"/>
<text x="80" y="85" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">1</text>
<rect x="60" y="35" width="320" height="90" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="60" y="35" width="320" height="90" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="105" y="75.77499999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">Logits are the raw, unnormalized</text>
<text x="105" y="93.32499999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">scores output</text>
<circle cx="440" cy="80" r="15" fill="#9333ea"/>
<text x="440" y="85" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">2</text>
<rect x="420" y="35" width="320" height="90" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="420" y="35" width="320" height="90" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="465" y="67" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">By a neural network's final</text>
<text x="465" y="84.55" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">layer before softmax converts</text>
<text x="465" y="102.10000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">them into probabilities</text>
<circle cx="80" cy="200" r="15" fill="#9333ea"/>
<text x="80" y="205" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">3</text>
<rect x="60" y="155" width="320" height="90" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="60" y="155" width="320" height="90" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="105" y="187" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">For language models, the output</text>
<text x="105" y="204.55" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">layer produces one logit per</text>
<text x="105" y="222.1" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">token in the vocabulary</text>
<circle cx="440" cy="200" r="15" fill="#9333ea"/>
<text x="440" y="205" font-family="'Inter',sans-serif" font-weight="800" font-size="14" fill="#ffffff" text-anchor="middle">4</text>
<rect x="420" y="155" width="320" height="90" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<rect x="420" y="155" width="320" height="90" rx="6" fill="rgba(147,51,234,0.06)"/>
<text x="465" y="195.775" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">Where higher logits indicate</text>
<text x="465" y="213.32500000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="start">higher model confidence</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#52525b" text-anchor="end">veda.ng</text>
</svg>