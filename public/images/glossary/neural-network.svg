<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(147,51,234,0.06)"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#e5e7eb" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect x="0" y="0" width="300" height="420" fill="url(#grid)"/>
  <rect x="-100" y="10" width="400" height="400" fill="url(#glow)"/>
  <line x1="300" y1="40" x2="300" y2="380" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4 4"/>
  
  <!-- Visual Architecture (Left Column) -->
  <g transform="translate(-250, 20)">
    <circle cx="340" cy="180" r="80" fill="#9333ea" opacity="0.15" stroke="#9333ea" stroke-width="2"/>
<circle cx="460" cy="180" r="80" fill="#9333ea" opacity="0.25" stroke="#9333ea" stroke-width="2"/>
<circle cx="400" cy="100" r="80" fill="#9333ea" opacity="0.35" stroke="#9333ea" stroke-width="2"/>

  </g>

  <!-- Content (Right Column) -->
  <text x="350" y="85" font-family="'Inter',sans-serif" font-weight="700" font-size="12" fill="#9333ea" text-anchor="start" letter-spacing="2.5" text-transform="uppercase">AI GLOSSARY</text>
  <text x="350" y="130" font-family="'Inter',sans-serif" font-weight="800" font-size="36" fill="#09090b" text-anchor="start" letter-spacing="-1">Neural Network</text>

  
  
  <!-- Minimal Branding -->
  <text x="760" y="390" font-family="'Inter',sans-serif" font-weight="700" font-size="12" fill="#e5e7eb" text-anchor="end">veda.ng</text>
</svg>