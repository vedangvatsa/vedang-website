<text x="600" y="166" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">Update the balance distribution</text>
<text x="600" y="184.9" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">without touching the blockchain</text>
<text x="600" y="203.8" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">until final settlement.</text>
