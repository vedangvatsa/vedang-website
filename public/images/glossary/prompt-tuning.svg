<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9333ea"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <g transform="translate(0, 80)">
    <rect x="170" y="15" width="300" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="170" y="15" width="300" height="60" rx="8" fill="rgba(147,51,234,0.06)"/>
<text x="320" y="40.775" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">Prompt tuning is a parameter-efficient</text>
<text x="320" y="58.325" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">adaptation method</text>
<path d="M 320 75 C 320 90, 480 85, 480 92" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="330" y="100" width="300" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="330" y="100" width="300" height="60" rx="8" fill="rgba(147,51,234,0.06)"/>
<text x="480" y="125.77499999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">That learns continuous 'soft prompt'</text>
<text x="480" y="143.32500000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">embeddings prepended</text>
<path d="M 480 160 C 480 175, 320 170, 320 177" fill="none" stroke="#9333ea" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="170" y="185" width="300" height="60" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="170" y="185" width="300" height="60" rx="8" fill="rgba(147,51,234,0.06)"/>
<text x="320" y="193.22500000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">To model inputs while keeping all model</text>
<text x="320" y="210.77500000000003" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">weights frozen, bridging the gap between</text>
<text x="320" y="228.32500000000002" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">manual prompt engineering and full</text>
<text x="320" y="245.87500000000003" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#52525b" text-anchor="middle">fine-tuning</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#52525b" text-anchor="end">veda.ng</text>
</svg>