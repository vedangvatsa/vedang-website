<text x="600" y="234.75" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="middle">Two types exist: price impact</text>
<text x="600" y="255" font-family="'Inter',sans-serif" font-weight="400" font-size="15" fill="#787774" text-anchor="middle">slippage occurs because your</text>
