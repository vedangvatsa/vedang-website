<text x="105" y="187" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">It blends sensors, computer</text>
<text x="105" y="204.55" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">vision, graphics, and real-time</text>
