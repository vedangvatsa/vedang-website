<text x="465" y="67" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">That let digital information</text>
<text x="465" y="84.55" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">exist and interact within</text>
<text x="465" y="102.10000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#a1a1aa" text-anchor="start">three-dimensional physical space</text>
