<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <g transform="translate(0, 80)">
    <rect x="310" y="65" width="180" height="50" rx="25" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="310" y="65" width="180" height="50" rx="25" fill="rgba(5,150,105,0.06)"/>
<text x="400" y="95.6" font-family="'Inter',sans-serif" font-weight="700" font-size="16" fill="#059669" text-anchor="middle">SSL/TLS</text>
<path d="M 400 115 L 160 150" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="60" y="150" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="60" y="150" width="200" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="160" y="169.89999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">SSL (Secure Sockets Layer)</text>
<text x="160" y="186.09999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">and TLS (Transport Layer</text>
<text x="160" y="202.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">Security) are cryptographic</text>
<text x="160" y="218.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">protocols</text>
<path d="M 400 115 L 640 150" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="540" y="150" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="540" y="150" width="200" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="640" y="169.89999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">That encrypt data sent</text>
<text x="640" y="186.09999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">between a web browser and a</text>
<text x="640" y="202.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">server, preventing anyone in</text>
<text x="640" y="218.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">between from reading or...</text>
<path d="M 400 115 L 400 180" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="300" y="180" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="300" y="180" width="200" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="400" y="199.89999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">When you see the padlock</text>
<text x="400" y="216.09999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">icon or "https" in your</text>
<text x="400" y="232.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">browser's address bar, TLS</text>
<text x="400" y="248.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">is active</text>
<path d="M 400 115 L 520 220" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="420" y="220" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="420" y="220" width="200" height="80" rx="8" fill="rgba(5,150,105,0.06)"/>
<text x="520" y="239.89999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">SSL was the original</text>
<text x="520" y="256.09999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">protocol, but it had</text>
<text x="520" y="272.3" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">security flaws and was</text>
<text x="520" y="288.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">replaced</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#52525b" text-anchor="end">veda.ng</text>
</svg>