<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#09090b">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#a1a1aa" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#09090b"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <text x="400" y="45" font-family="'Inter',sans-serif" font-weight="800" font-size="28" fill="#fafafa" text-anchor="middle" letter-spacing="-0.5">SSL/TLS</text>
  <text x="400" y="70" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#10b981" text-anchor="middle" letter-spacing="2" text-transform="uppercase">Deconstructed: Tech Concept</text>
  <line x1="200" y1="85" x2="600" y2="85" stroke="#27272a" stroke-width="1.5" opacity="0.5"/>
  
  <g transform="translate(0, 100)">
    <rect x="310" y="105" width="180" height="50" rx="25" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="310" y="105" width="180" height="50" rx="25" fill="rgba(16,185,129,0.1)"/>
<text x="400" y="135.6" font-family="'Inter',sans-serif" font-weight="700" font-size="16" fill="#10b981" text-anchor="middle">SSL/TLS</text>
<path d="M 400 130 L 170 130" fill="none" stroke="#27272a" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="75" y="90" width="190" height="80" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="75" y="90" width="190" height="80" rx="8" fill="rgba(16,185,129,0.1)"/>
<text x="170" y="109.89999999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">SSL (Secure Sockets Layer)</text>
<text x="170" y="126.1" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">and TLS (Transport Layer</text>
<text x="170" y="142.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">Security) are</text>
<text x="170" y="158.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">cryptographic protocols</text>
<path d="M 400 130 L 630 130" fill="none" stroke="#27272a" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="535" y="90" width="190" height="80" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="535" y="90" width="190" height="80" rx="8" fill="rgba(16,185,129,0.1)"/>
<text x="630" y="109.89999999999999" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">That encrypt data sent</text>
<text x="630" y="126.1" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">between a web browser and</text>
<text x="630" y="142.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">a server, preventing</text>
<text x="630" y="158.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">anyone in between from...</text>
<path d="M 400 130 L 400 240" fill="none" stroke="#27272a" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="305" y="200" width="190" height="80" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="305" y="200" width="190" height="80" rx="8" fill="rgba(16,185,129,0.1)"/>
<text x="400" y="219.89999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">When you see the padlock</text>
<text x="400" y="236.09999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">icon or "https" in your</text>
<text x="400" y="252.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">browser's address bar, TLS</text>
<text x="400" y="268.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">is active</text>
<path d="M 400 130 L 400 30" fill="none" stroke="#27272a" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="305" y="-10" width="190" height="80" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="305" y="-10" width="190" height="80" rx="8" fill="rgba(16,185,129,0.1)"/>
<text x="400" y="9.899999999999995" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">SSL was the original</text>
<text x="400" y="26.099999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">protocol, but it had</text>
<text x="400" y="42.3" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">security flaws and was</text>
<text x="400" y="58.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#a1a1aa" text-anchor="middle">replaced</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#09090b" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#a1a1aa" text-anchor="end">veda.ng</text>
</svg>