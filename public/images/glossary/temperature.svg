<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
<defs>
  <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M 0 0 L 6 3 L 0 6 z" fill="#9333ea"/></marker>
</defs>
<rect width="800" height="400" fill="#ffffff"/>
<g>
  <!-- T = 0.1 Focused (sharp peak) -->
  <path d="M 100 290 Q 170 290 200 100 Q 230 290 300 290" fill="none" stroke="#10b981" stroke-width="3"/>
  <text x="200" y="320" font-family="'Inter',sans-serif" font-weight="700" font-size="16" fill="#10b981" text-anchor="middle">T = 0.1</text>
  <text x="200" y="85" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#10b981" text-anchor="middle">Focused</text>

  <!-- T = 0.7 Balanced (medium peak) -->
  <path d="M 320 290 Q 390 290 420 160 Q 450 290 520 290" fill="none" stroke="#9333ea" stroke-width="3"/>
  <text x="420" y="320" font-family="'Inter',sans-serif" font-weight="700" font-size="16" fill="#9333ea" text-anchor="middle">T = 0.7</text>
  <text x="420" y="145" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#9333ea" text-anchor="middle">Balanced</text>

  <!-- T = 2.0 Creative (flat curve) -->
  <path d="M 550 290 Q 610 290 650 220 Q 690 290 750 290" fill="none" stroke="#ef4444" stroke-width="3"/>
  <text x="650" y="320" font-family="'Inter',sans-serif" font-weight="700" font-size="16" fill="#ef4444" text-anchor="middle">T = 2.0</text>
  <text x="650" y="210" font-family="'Inter',sans-serif" font-weight="600" font-size="16" fill="#ef4444" text-anchor="middle">Creative</text>

  <!-- Y-axis -->
  <line x1="70" y1="75" x2="70" y2="300" stroke="#e5e7eb" stroke-width="2"/>
  <text x="68" y="65" font-family="'Inter',sans-serif" font-weight="500" font-size="13" fill="#787774" text-anchor="middle">Probability</text>
</g>
<rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
<text x="770" y="385" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#787774" text-anchor="end">@vedangvatsa</text>
</svg>