<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#09090b">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#a1a1aa" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#09090b"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <text x="400" y="45" font-family="'Inter',sans-serif" font-weight="800" font-size="28" fill="#fafafa" text-anchor="middle" letter-spacing="-0.5">Tokenization</text>
  <text x="400" y="70" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#3b82f6" text-anchor="middle" letter-spacing="2" text-transform="uppercase">Deconstructed: Web3 Concept</text>
  <line x1="200" y1="85" x2="600" y2="85" stroke="#27272a" stroke-width="1.5" opacity="0.5"/>
  
  <g transform="translate(0, 100)">
    <rect x="190" y="20" width="420" height="60" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="190" y="20" width="420" height="60" rx="8" fill="rgba(59,130,246,0.1)"/>
<text x="400" y="36" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">Tokenization, in the Web3 context, is the process of</text>
<text x="400" y="54.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">representing ownership of a real-world or digital asset as</text>
<text x="400" y="73.80000000000001" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">a token on a blockchain</text>
<line x1="400" y1="83" x2="400" y2="92" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="190" y="100" width="420" height="60" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="190" y="100" width="420" height="60" rx="8" fill="rgba(59,130,246,0.1)"/>
<text x="400" y="116" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">Any asset that has value and can be owned can be</text>
<text x="400" y="134.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">tokenized: real estate, equity in a company, fine art,</text>
<text x="400" y="153.8" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">commodities, intellectual property, or carbon credits</text>
<line x1="400" y1="163" x2="400" y2="172" stroke="#3b82f6" stroke-width="2.5" marker-end="url(#arrow)"/>
<rect x="190" y="180" width="420" height="60" rx="8" fill="#09090b" stroke="#27272a" stroke-width="2"/>
<rect x="190" y="180" width="420" height="60" rx="8" fill="rgba(59,130,246,0.1)"/>
<text x="400" y="196" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">Once tokenized, the asset can be traded, fractionalized,</text>
<text x="400" y="214.9" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">and transferred with the speed and transparency of</text>
<text x="400" y="233.8" font-family="'Inter',sans-serif" font-weight="500" font-size="14" fill="#a1a1aa" text-anchor="middle">blockchain transactions</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#09090b" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#a1a1aa" text-anchor="end">veda.ng</text>
</svg>