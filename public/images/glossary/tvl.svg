<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
<rect width="800" height="400" fill="#ffffff"/>
<g>
  <!-- Summary text at top -->
  <text x="400" y="50" font-family="'Inter',sans-serif" font-weight="600" font-size="18" fill="#37352f" text-anchor="middle">Total deposits locked in DeFi protocols</text>

  <!-- X-axis -->
  <line x1="120" y1="310" x2="720" y2="310" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Bars - scaled to fit y=80 to y=310 (230px range) -->
  <!-- Aave $24B - tallest -->
  <rect x="150" y="90" width="75" height="220" rx="4" fill="#2563eb" fill-opacity="0.2"/>
  <text x="188" y="82" font-family="'Inter',sans-serif" font-weight="700" font-size="14" fill="#2563eb" text-anchor="middle">$24B</text>
  <text x="188" y="330" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#787774" text-anchor="middle">Aave</text>

  <!-- Lido $20B -->
  <rect x="260" y="128" width="75" height="182" rx="4" fill="#2563eb" fill-opacity="0.32"/>
  <text x="298" y="120" font-family="'Inter',sans-serif" font-weight="700" font-size="14" fill="#2563eb" text-anchor="middle">$20B</text>
  <text x="298" y="330" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#787774" text-anchor="middle">Lido</text>

  <!-- Maker $16B -->
  <rect x="370" y="164" width="75" height="146" rx="4" fill="#2563eb" fill-opacity="0.44"/>
  <text x="408" y="156" font-family="'Inter',sans-serif" font-weight="700" font-size="14" fill="#2563eb" text-anchor="middle">$16B</text>
  <text x="408" y="330" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#787774" text-anchor="middle">Maker</text>

  <!-- Curve $12B -->
  <rect x="480" y="200" width="75" height="110" rx="4" fill="#2563eb" fill-opacity="0.56"/>
  <text x="518" y="192" font-family="'Inter',sans-serif" font-weight="700" font-size="14" fill="#2563eb" text-anchor="middle">$12B</text>
  <text x="518" y="330" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#787774" text-anchor="middle">Curve</text>

  <!-- Uniswap $9B -->
  <rect x="590" y="228" width="75" height="82" rx="4" fill="#2563eb" fill-opacity="0.68"/>
  <text x="628" y="220" font-family="'Inter',sans-serif" font-weight="700" font-size="14" fill="#2563eb" text-anchor="middle">$9B</text>
  <text x="628" y="330" font-family="'Inter',sans-serif" font-weight="600" font-size="13" fill="#787774" text-anchor="middle">Uniswap</text>
</g>
<rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
<text x="770" y="385" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#787774" text-anchor="end">@vedangvatsa</text>
</svg>