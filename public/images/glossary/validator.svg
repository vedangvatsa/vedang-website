<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" style="background-color:#ffffff">
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#52525b" opacity="0.15"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="420" fill="#ffffff"/>
  <rect width="800" height="420" fill="url(#grid)"/>
  
  <g transform="translate(0, 80)">
    <rect x="310" y="65" width="180" height="50" rx="25" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="310" y="65" width="180" height="50" rx="25" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="95.6" font-family="'Inter',sans-serif" font-weight="700" font-size="16" fill="#2563eb" text-anchor="middle">Validator</text>
<path d="M 400 115 L 160 150" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="60" y="150" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="60" y="150" width="200" height="80" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="160" y="169.89999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">A validator is a node that</text>
<text x="160" y="186.09999999999997" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">proposes and verifies new</text>
<text x="160" y="202.29999999999998" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">blocks on a Proof of Stake</text>
<text x="160" y="218.5" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">blockchain</text>
<path d="M 400 115 L 640 150" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="540" y="150" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="540" y="150" width="200" height="80" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="640" y="186.1" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">In Proof of Work systems,</text>
<text x="640" y="202.3" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">miners compete</text>
<path d="M 400 115 L 400 180" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="300" y="180" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="300" y="180" width="200" height="80" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="400" y="208" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">To solve puzzles . In Proof</text>
<text x="400" y="224.2" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">of Stake, validators stake</text>
<text x="400" y="240.4" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">tokens as collateral</text>
<path d="M 400 115 L 520 220" fill="none" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="4 4"/>
<rect x="420" y="220" width="200" height="80" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="420" y="220" width="200" height="80" rx="8" fill="rgba(37,99,235,0.06)"/>
<text x="520" y="256.1" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">They're selected to propose</text>
<text x="520" y="272.3" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#52525b" text-anchor="middle">blocks based on their stake</text>

  </g>
  
  <rect x="0" y="380" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="405" font-family="'Inter',sans-serif" font-weight="600" font-size="11" fill="#52525b" text-anchor="end">veda.ng</text>
</svg>