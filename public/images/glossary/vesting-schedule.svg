<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400" style="background-color:#ffffff">
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#2563eb"/>
    </marker>
  </defs>
  <rect width="800" height="400" fill="#ffffff"/>
  
  <g>
    <rect x="190" y="20" width="420" height="100" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="400" y="46.55" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">A vesting schedule releases tokens to</text>
<text x="400" y="65.45" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">recipients gradually over time rather than</text>
<text x="400" y="84.35000000000001" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">all at once, creating alignment between</text>
<text x="400" y="103.25" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">stakeholders and long-term project success.</text>
<path d="M 400 120 L 220 205" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 400 120 L 580 205" fill="none" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="30" y="205" width="340" height="130" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="200" y="232.4" font-family="'Inter',sans-serif" font-weight="400" font-size="16" fill="#787774" text-anchor="middle">Founders, team members,</text>
<text x="200" y="254" font-family="'Inter',sans-serif" font-weight="400" font-size="16" fill="#787774" text-anchor="middle">investors, and advisors</text>
<text x="200" y="275.6" font-family="'Inter',sans-serif" font-weight="400" font-size="16" fill="#787774" text-anchor="middle">typically receive tokens with</text>
<text x="200" y="297.20000000000005" font-family="'Inter',sans-serif" font-weight="400" font-size="16" fill="#787774" text-anchor="middle">vesting conditions that prevent</text>
<text x="200" y="318.80000000000007" font-family="'Inter',sans-serif" font-weight="400" font-size="16" fill="#787774" text-anchor="middle">immediate selling.</text>
<rect x="430" y="205" width="340" height="130" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<text x="600" y="227.65" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">The standard structure includes a</text>
<text x="600" y="246.55" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">cliff period (often 6-12 months)</text>
<text x="600" y="265.45" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">during which no tokens vest,</text>
<text x="600" y="284.34999999999997" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">followed by linear or</text>
<text x="600" y="303.25" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">milestone-based distribution over</text>
<text x="600" y="322.15" font-family="'Inter',sans-serif" font-weight="400" font-size="14" fill="#787774" text-anchor="middle">2-4 years.</text>

  </g>
  
  <rect x="0" y="360" width="800" height="40" fill="#ffffff" opacity="0.9"/>
  <text x="770" y="385" font-family="'Inter',sans-serif" font-weight="500" font-size="12" fill="#787774" text-anchor="end">@vedangvatsa</text>
</svg>